<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MapLibre SVG Marker</title>

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
<h1>OpenFlagMap (Demo)</h1>
<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [-56.3792, 47.1],
  zoom: 6
});

map.on('load', () => {

  // Create image element instead of background CSS
  const img = document.createElement('img');
  img.src = 'https://upload.wikimedia.org/wikipedia/commons/2/27/Flag_of_Miquelon-Langlade.svg';
  img.style.maxHeight = '40px';

  new maplibregl.Marker({
    element: img,
    anchor: 'center'
  })
  .setLngLat([-56.3792, 47.1])
  .addTo(map);

  // Marker 2 (different SVG)
  const icon2 = document.createElement('img');
  icon2.src = 'https://upload.wikimedia.org/wikipedia/commons/2/24/Flag_of_Saint_Pierre.gif';
  icon2.style.maxHeight = '40px';

  new maplibregl.Marker({ element: icon2, anchor: 'bottom' })
    .setLngLat([-56.173611, 46.781667])
    .addTo(map);

});
</script>

</body>
</html>
